# Server Port
server.port=${PORT:8081}

# Database Connection Configuration
# Adjust the port (default 3306), username, and password to match your local MySQL setup.
spring.datasource.url=jdbc:mysql://localhost:3306/workmitra_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# The secret key must be at least 256-bits (32 characters) long.
workmitra.jwt.secret=9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d
# Token validity duration: 86400000 ms = 24 Hours
workmitra.jwt.expiration-ms=86400000

# Enable incoming JSON payload logging for debugging in development
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
